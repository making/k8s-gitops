apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: access-monitor-app
  namespace: app-install
  annotations:
    kapp.k14s.io/change-group: "{name}"
    kapp.k14s.io/change-rule.create-order.1: "upsert after upserting access-monitor-valkey"
    kapp.k14s.io/change-rule.delete-order.1: "delete before deleting access-monitor-valkey"
    kapp.k14s.io/change-rule.create-order.2: "upsert after upserting access-monitor-rabbitmq"
    kapp.k14s.io/change-rule.delete-order.2: "delete before deleting access-monitor-rabbitmq"
spec:
  serviceAccountName: kapp
  fetch:
  - helmChart:
      name: application
      version: "6.16.1"
      repository:
        url: https://stakater.github.io/stakater-charts
  - git:
      url: https://github.com/making/k8s-gitops.git
      ref: origin/main
      subPath: apricot/app/access-monitor-app
  - git:
      url: https://github.com/categolj/access-monitor.git
      ref: origin/images
  syncPeriod: 1h
  template:
  - sops:
      age:
        privateKeysSecretRef:
          name: age-key
  - helmTemplate:
      name: access-monitor-app
      namespace: access-monitor
      path: "0"
      valuesFrom:
      - path: 1/helm-values.yaml
      - path: 2/jvm_amd64.yaml
  - ytt:
      paths:
      - "-"
      - 1/config
      valuesFrom:
      - path: 1/credentials.yaml
  - kbld:
      paths:
      - '-'
  deploy:
  - kapp:
      rawOptions:
      - --wait-timeout=5m
      - --diff-changes=true
      - --diff-mask=false
      delete:
        #! Force delete PVCs, since StatefulSet does not delete them
        rawOptions:
        - --apply-ignored=true