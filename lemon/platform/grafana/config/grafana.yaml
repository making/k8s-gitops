#@ load("@ytt:data", "data")
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana
  labels:
    app.kubernetes.io/part-of: grafana
spec:
  version: "12.4.0"
  client:
    timeout: 5
  service:
    spec:
      type: ClusterIP
  deployment:
    metadata:
      labels:
        app.kubernetes.io/part-of: grafana
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/part-of: grafana
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: grafana
        spec:
          imagePullSecrets:
          - name: regsecret
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/part-of: grafana
                  topologyKey: kubernetes.io/hostname
                weight: 1
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: Always
            supplementalGroups: [ ]
            sysctls: [ ]
          volumes:
          - name: empty-dir
            emptyDir: { }
          - name: grafana-data
            emptyDir: { }
          - name: grafana-configmaps
            secret:
              secretName: ldap-config
          containers:
          - name: grafana
            image: registry.maki.lol/bitnamicharts/photon-5/grafana:12.4.0-photon-5-r1
            imagePullPolicy: IfNotPresent
            env:
            - name: AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client-id
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client-secret
            #! - name: GF_INSTALL_PLUGINS
            #!   value: https://github.com/motherduckdb/grafana-duckdb-datasource/releases/download/0.1.0/motherduck-duckdb-datasource-0.1.0.zip;motherduck-duckdb-datasource
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              privileged: false
              readOnlyRootFilesystem: false
              runAsGroup: 0
              runAsNonRoot: true
              runAsUser: 1001
              seLinuxOptions: { }
              seccompProfile:
                type: RuntimeDefault
            livenessProbe:
              initialDelaySeconds: 120
              periodSeconds: 10
              timeoutSeconds: 5
              successThreshold: 1
              failureThreshold: 6
              tcpSocket:
                port: 3000
            readinessProbe:
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              successThreshold: 1
              failureThreshold: 6
              httpGet:
                path: /api/health
                port: 3000
                scheme: HTTP
            volumeMounts:
            - name: empty-dir
              mountPath: /tmp
              subPath: tmp-dir
            - name: empty-dir
              mountPath: /opt/bitnami/grafana/conf
              subPath: app-conf-dir
            - name: empty-dir
              mountPath: /opt/bitnami/grafana/tmp
              subPath: app-tmp-dir
            - name: grafana-configmaps
              mountPath: /etc/grafana-configmaps
              readOnly: false
  config:
    #! plugins:
    #!   allow_loading_unsigned_plugins: motherduck-duckdb-datasource
    analytics:
      check_for_updates: "false"
      reporting_enabled: "false"
    database:
      wal: "true"
    log:
      level: warn
      mode: console
    auth:
      disable_login_form: "false"
    auth.ldap:
      enabled: "true"
      config_file: /etc/grafana-configmaps/ldap.toml
    security:
      disable_gravatar: "false"
    server:
      root_url: https://grafana.ik.am
    auth.generic_oauth:
      enabled: "true"
      name: "Maki ID"
      allow_sign_up: "true"
      client_id: ${AUTH_CLIENT_ID}
      client_secret: ${AUTH_CLIENT_SECRET}
      scopes: "openid email profile groups"
      email_attribute_path: email
      login_attribute_path: preferred_username
      name_attribute_path: preferred_username
      groups_attribute_path: groups
      auth_url: #@ data.values.oidc.auth_url
      token_url: #@ data.values.oidc.token_url
      api_url: #@ data.values.oidc.api_url
      role_attribute_path: "contains(groups[*], 'administrators') && 'Admin' || contains(groups[*], 'grafana-editor') && 'Editor' || 'Viewer'"
  jsonnet:
    libraryLabelSelector:
      matchLabels:
        app.kubernetes.io/part-of: grafana