image:
  # Pin to v3.6.15. Both v3.6.16 and v3.7.0 (released 2026-05-05) introduced
  # a regression in pkg/provider/kubernetes/crd/kubernetes_http.go that always
  # emits "namespace ... is ignored in cross-provider context" warnings for
  # IngressRoutes referencing services like api@internal. Drop this once a
  # release with the master-branch fix ships.
  tag: v3.6.15
service:
  type: ClusterIP
deployment:
  replicas: 2
api:
  insecure: true
ports:
  web:
    proxyProtocol:
      trustedIPs:
      - 10.0.0.0/16
      - 10.96.0.0/16
    transport:
      respondingTimeouts:
        readTimeout: 600s
        writeTimeout: 600s
        idleTimeout: 600s
  websecure:
    proxyProtocol:
      trustedIPs:
      - 10.0.0.0/16
      - 10.96.0.0/16
    transport:
      respondingTimeouts:
        readTimeout: 600s
        writeTimeout: 600s
        idleTimeout: 600s
logs:
  general:
    format: json
    level: WARN
  access:
    enabled: true
    format: json
    otlp:
      enabled: true
      http:
        enabled: true
        endpoint: http://otel-collector.opentelemetry.svc.cluster.local:4318/v1/logs
        #! tls:
        #!   insecureSkipVerify: true
tracing:
  otlp:
    enabled: true
    http:
      enabled: true
      endpoint: http://otel-collector.opentelemetry.svc.cluster.local:4318/v1/traces
      #! tls:
      #!   insecureSkipVerify: true
experimental:
  plugins:
    coraza:
      moduleName: "github.com/jcchavezs/coraza-http-wasm-traefik"
      version: "v0.3.0"
    oidc-auth:
      moduleName: "github.com/sevensolutions/traefik-oidc-auth"
      version: "v0.19.0"
    api-token:
      moduleName: "github.com/Aetherinox/traefik-api-token-middleware"
      version: "v0.1.4"
  otlpLogs: true
ingressRoute:
  dashboard:
    enabled: false
extraObjects:
- apiVersion: cert-manager.io/v1
  kind: Certificate
  metadata:
    name: dashboard-tls
    namespace: traefik
  spec:
    secretName: dashboard-tls
    issuerRef:
      name: letsencrypt
      kind: ClusterIssuer
    dnsNames:
    - dashboard.traefik.ik.am
