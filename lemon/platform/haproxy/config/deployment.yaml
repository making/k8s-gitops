apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
  namespace: haproxy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: haproxy
  template:
    metadata:
      labels:
        app: haproxy
    spec:
      #! Must exceed preStop sleep + HAProxy soft-stop drain time.
      #! OCI NLB needs ~30s to mark the node unhealthy via healthCheckNodePort,
      #! then we still want time for in-flight connections to finish.
      #! preStop (60s) + hard-stop-after (60s) = 120s, plus 10s buffer.
      terminationGracePeriodSeconds: 130
      containers:
      - name: haproxy
        image: haproxy:3.2
        lifecycle:
          preStop:
            exec:
              #! Keep accepting traffic until OCI NLB stops routing to this node.
              #! The healthCheckNodePort flips to "no local endpoints" the moment
              #! this Pod becomes Terminating, but the NLB takes ~30s to react;
              #! 60s gives kube-proxy + NLB enough buffer to settle.
              command: [ "/bin/sh", "-c", "sleep 60" ]
        ports:
        - containerPort: 25565
          name: minecraft
        - containerPort: 35565
          name: mc-vanilla
        - containerPort: 8080
          name: http
        - containerPort: 8443
          name: https
        - containerPort: 8389
          name: ldap
        - containerPort: 8636
          name: ldaps
        - containerPort: 9090
          name: vault-audit
        volumeMounts:
        - name: haproxy-config
          mountPath: /usr/local/etc/haproxy/haproxy.cfg
          subPath: haproxy.cfg
        - name: blocked-ips
          mountPath: /usr/local/etc/haproxy/blocked-ips.txt
          subPath: blocked-ips.txt
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 99
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: haproxy
              topologyKey: kubernetes.io/hostname
            weight: 1
      volumes:
      - name: haproxy-config
        configMap:
          name: haproxy-config
      - name: blocked-ips
        configMap:
          name: haproxy-blocked-ips