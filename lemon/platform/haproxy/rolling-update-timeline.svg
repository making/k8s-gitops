<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="-apple-system, system-ui, 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="960" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">HAProxy Rolling Update タイムライン</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#6b7280">terminationGracePeriodSeconds: 130s ／ preStop: sleep 60s ／ hard-stop-after: 60s</text>

  <!-- Lane background stripes -->
  <rect x="140" y="110" width="760" height="50" fill="#f9fafb"/>
  <rect x="140" y="230" width="760" height="50" fill="#f9fafb"/>
  <rect x="140" y="350" width="760" height="50" fill="#f9fafb"/>

  <!-- Safety margin highlight band (30s - 60s) -->
  <rect x="315.4" y="92" width="175.4" height="318" fill="#10b981" opacity="0.08"/>

  <!-- Time axis: 0-130s mapped to x=140-900 (5.846 px/s) -->
  <line x1="140" y1="88" x2="900" y2="88" stroke="#374151" stroke-width="1.2"/>
  <g font-size="11" fill="#374151" text-anchor="middle">
    <line x1="140" y1="84" x2="140" y2="92" stroke="#374151"/><text x="140" y="78">0s</text>
    <line x1="198.5" y1="84" x2="198.5" y2="92" stroke="#374151"/><text x="198.5" y="78">10s</text>
    <line x1="256.9" y1="84" x2="256.9" y2="92" stroke="#374151"/><text x="256.9" y="78">20s</text>
    <line x1="315.4" y1="84" x2="315.4" y2="92" stroke="#374151"/><text x="315.4" y="78" font-weight="700">30s</text>
    <line x1="373.8" y1="84" x2="373.8" y2="92" stroke="#374151"/><text x="373.8" y="78">40s</text>
    <line x1="432.3" y1="84" x2="432.3" y2="92" stroke="#374151"/><text x="432.3" y="78">50s</text>
    <line x1="490.8" y1="84" x2="490.8" y2="92" stroke="#374151"/><text x="490.8" y="78" font-weight="700">60s</text>
    <line x1="549.2" y1="84" x2="549.2" y2="92" stroke="#374151"/><text x="549.2" y="78">70s</text>
    <line x1="607.7" y1="84" x2="607.7" y2="92" stroke="#374151"/><text x="607.7" y="78">80s</text>
    <line x1="666.2" y1="84" x2="666.2" y2="92" stroke="#374151"/><text x="666.2" y="78">90s</text>
    <line x1="724.6" y1="84" x2="724.6" y2="92" stroke="#374151"/><text x="724.6" y="78">100s</text>
    <line x1="783.1" y1="84" x2="783.1" y2="92" stroke="#374151"/><text x="783.1" y="78">110s</text>
    <line x1="841.5" y1="84" x2="841.5" y2="92" stroke="#374151"/><text x="841.5" y="78" font-weight="700">120s</text>
    <line x1="900" y1="84" x2="900" y2="92" stroke="#374151"/><text x="900" y="78" font-weight="700">130s</text>
  </g>

  <!-- Vertical event guide lines: 30s, 60s, 120s, 130s -->
  <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3">
    <line x1="315.4" y1="92" x2="315.4" y2="410"/>
    <line x1="490.8" y1="92" x2="490.8" y2="410"/>
    <line x1="841.5" y1="92" x2="841.5" y2="410"/>
    <line x1="900" y1="92" x2="900" y2="410"/>
  </g>

  <!-- Lane labels -->
  <g font-size="12" font-weight="600" fill="#111827" text-anchor="end">
    <text x="132" y="140">Pod</text>
    <text x="132" y="200">OCI NLB</text>
    <text x="132" y="260">preStop</text>
    <text x="132" y="320">HAProxy</text>
    <text x="132" y="380">接続</text>
  </g>

  <!-- Lane 1: Pod -->
  <!-- 0-130s: Terminating -->
  <rect x="140" y="120" width="760" height="30" rx="4" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <text x="520" y="139" text-anchor="middle" font-size="12" fill="#7c2d12">Terminating（Endpoints から除外、healthCheckNodePort = 503）</text>

  <!-- Lane 2: OCI NLB -->
  <!-- 0-30s: green sending; 30s+: red unhealthy -->
  <rect x="140" y="180" width="175.4" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="227.7" y="199" text-anchor="middle" font-size="12" fill="#14532d">新規接続を流す</text>
  <rect x="315.4" y="180" width="584.6" height="30" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="607.7" y="199" text-anchor="middle" font-size="12" fill="#7f1d1d">unhealthy 判定 → 新規接続を流さない</text>

  <!-- Lane 3: preStop -->
  <!-- 0-60s: blue active; 60s+: gray done -->
  <rect x="140" y="240" width="350.8" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="315.4" y="259" text-anchor="middle" font-size="12" fill="#1e3a8a">sleep 60s（HAProxy はまだ稼働継続）</text>
  <rect x="490.8" y="240" width="409.2" height="30" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="695.4" y="259" text-anchor="middle" font-size="11" fill="#6b7280">完了</text>

  <!-- Lane 4: HAProxy process -->
  <!-- 0-60s: green normal; 60s-120s: yellow soft-stop; 120s-130s: red hard-stop -->
  <rect x="140" y="300" width="350.8" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="315.4" y="319" text-anchor="middle" font-size="12" fill="#14532d">通常稼働（新規受け付け）</text>
  <rect x="490.8" y="300" width="350.7" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="666.2" y="319" text-anchor="middle" font-size="12" fill="#78350f">soft-stop ／ in-flight drain</text>
  <rect x="841.5" y="300" width="58.5" height="30" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="870.8" y="319" text-anchor="middle" font-size="11" fill="#7f1d1d">hard-stop</text>

  <!-- Lane 5: 接続 -->
  <rect x="140" y="360" width="175.4" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="227.7" y="379" text-anchor="middle" font-size="12" fill="#14532d">新規 ＋ 既存</text>
  <rect x="315.4" y="360" width="175.4" height="30" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="403.1" y="379" text-anchor="middle" font-size="11" fill="#065f46">既存のみ</text>
  <rect x="490.8" y="360" width="350.7" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="666.2" y="379" text-anchor="middle" font-size="12" fill="#78350f">既存接続を drain</text>
  <rect x="841.5" y="360" width="58.5" height="30" rx="4" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="870.8" y="379" text-anchor="middle" font-size="10" fill="#374151">全閉</text>

  <!-- Connector lines from event ticks to callout tops -->
  <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3">
    <line x1="315.4" y1="410" x2="315.4" y2="425"/>
    <line x1="490.8" y1="410" x2="490.8" y2="488"/>
    <line x1="841.5" y1="410" x2="841.5" y2="425"/>
    <line x1="900" y1="410" x2="900" y2="488"/>
  </g>

  <!-- Bottom callouts row 1: 30s, 120s -->
  <g transform="translate(245.4, 425)">
    <rect width="140" height="46" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">30s: NLB unhealthy</text>
    <text x="70" y="36" text-anchor="middle" font-size="10" fill="#374151">新規接続が来なくなる</text>
  </g>
  <g transform="translate(771.5, 425)">
    <rect width="140" height="46" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">120s: hard-stop 発火</text>
    <text x="70" y="36" text-anchor="middle" font-size="10" fill="#374151">残接続を強制 close</text>
  </g>

  <!-- Bottom callouts row 2: 60s, 130s -->
  <g transform="translate(420.8, 488)">
    <rect width="140" height="46" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">60s: SIGUSR1 → soft-stop</text>
    <text x="70" y="36" text-anchor="middle" font-size="10" fill="#374151">既存接続のみ処理</text>
  </g>
  <g transform="translate(830, 488)">
    <rect width="140" height="46" rx="4" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2937">130s: grace 到達</text>
    <text x="70" y="36" text-anchor="middle" font-size="10" fill="#374151">10s の余裕</text>
  </g>

  <!-- Safety margin footnote -->
  <text x="480" y="555" text-anchor="middle" font-size="11" fill="#065f46">
    <tspan font-weight="700">安全マージン (30s〜60s)：</tspan>
    <tspan>NLB はもう新規を流さず、HAProxy はまだ生きている → 新規接続を失わない</tspan>
  </text>
</svg>
