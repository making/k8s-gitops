apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: counter-api-cpp
  namespace: app-install
  annotations:
    kapp.k14s.io/change-group: "{name}"
    kapp.k14s.io/change-rule.create-order.1: "upsert after upserting blog-api"
    kapp.k14s.io/change-rule.delete-order.1: "delete before deleting blog-api"
spec:
  serviceAccountName: kapp
  fetch:
  - helmChart:
      name: application
      repository:
        url: oci://ghcr.io/stakater/charts
      version: "8.1.2"
  - git:
      url: https://github.com/making/k8s-gitops.git
      ref: origin/main
      subPath: lemon/app/counter-api-cpp
  syncPeriod: 10m
  template:
  - sops:
      age:
        privateKeysSecretRef:
          name: age-key
  - helmTemplate:
      name: counter-api-cpp
      namespace: blog
      path: "0"
      valuesFrom:
      - path: 1/helm-values.yaml
  - kbld:
      paths:
      - '-'
  deploy:
  - kapp:
      rawOptions:
      - --wait-timeout=5m
      - --diff-changes=true
      - --diff-mask=true
      delete:
        #! Force delete PVCs, since StatefulSet does not delete them
        rawOptions:
        - --apply-ignored=true